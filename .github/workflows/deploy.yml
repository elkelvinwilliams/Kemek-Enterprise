name: Deploy preview to GitHub Pages

# Builds the Tailwind CSS fresh and publishes the site on every push to main,
# so the preview link always reflects your latest edits.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html services.html about.html contact.html _site/
          cp -r css js _site/
          cp favicon.svg site.webmanifest robots.txt sitemap.xml _site/ 2>/dev/null || true
          [ -d assets ] && cp -r assets _site/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
